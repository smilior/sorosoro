  <text x="275" y="136.8" text-anchor="middle" font-size="11" fill="#6b7280">push（トリガー）</text>
  <line x1="200" y1="278" x2="350" y2="250" stroke="#00755c" stroke-width="2" marker-end="url(#af)"/>
  <rect x="224.7" y="279.5" width="100.6" height="17.0" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="275" y="291.9" text-anchor="middle" font-size="11" fill="#6b7280">push（トリガー）</text>
  <line x1="610" y1="175" x2="770" y2="123" stroke="#00755c" stroke-width="2" marker-end="url(#af)"/>
  <rect x="652.0" y="124.5" width="76.0" height="17.0" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="690" y="136.8" text-anchor="middle" font-size="11" fill="#6b7280">自動デプロイ</text>
  <line x1="610" y1="250" x2="770" y2="278" stroke="#00755c" stroke-width="2" marker-end="url(#af)"/>
  <rect x="652.0" y="279.5" width="76.0" height="17.0" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="690" y="291.9" text-anchor="middle" font-size="11" fill="#6b7280">自動デプロイ</text>
  <line x1="480" y1="330" x2="480" y2="277" stroke="#9aa0a6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ax)"/>
  <rect x="430.1" y="294.5" width="99.8" height="17.0" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="480" y="306.9" text-anchor="middle" font-size="11" fill="#6b7280">.env.&lt;ENV&gt; 生成</text>
  <rect x="40" y="408" width="890" height="31" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="40" y="408" width="4" height="31" rx="2" fill="#00a984"/>
  <text x="56" y="428" font-size="11" fill="#6b7280">DEV（ローカル環境）は手動デプロイのため CD 対象外。自動CD は STG（develop へ push）/ PRD（main へ push）のみ。</text>
