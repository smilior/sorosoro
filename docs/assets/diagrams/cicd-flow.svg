  </defs>
  <rect x="0" y="0" width="960" height="455" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#333333">CI/CD パイプライン（push 連動の自動CD）</text>
  <rect x="40" y="95" width="160" height="56" rx="10" fill="#ffffff" stroke="#cdeae0" stroke-width="1.4"/>
  <text x="120" y="119" text-anchor="middle" font-size="13" font-weight="700" fill="#333333">develop</text>
  <text x="120" y="138" text-anchor="middle" font-size="11" fill="#6b7280">STG 系ブランチ</text>
  <rect x="40" y="250" width="160" height="56" rx="10" fill="#ffffff" stroke="#cdeae0" stroke-width="1.4"/>
  <text x="120" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#333333">main</text>
  <text x="120" y="293" text-anchor="middle" font-size="11" fill="#6b7280">PRD 系ブランチ</text>
  <rect x="350" y="145" width="260" height="130" rx="10" fill="#ffffff" stroke="#cdeae0" stroke-width="1.4"/>
  <text x="480" y="169" text-anchor="middle" font-size="13" font-weight="700" fill="#333333">GitHub Actions</text>
  <text x="480" y="188" text-anchor="middle" font-size="11" fill="#6b7280">Self-Hosted Runner</text>
  <text x="480" y="204" text-anchor="middle" font-size="11" fill="#6b7280">push で自動トリガー</text>
  <text x="480" y="220" text-anchor="middle" font-size="11" fill="#6b7280">自動CD → STG / PRD</text>
  <rect x="770" y="95" width="160" height="56" rx="10" fill="#ffffff" stroke="#cdeae0" stroke-width="1.4"/>
  <text x="850" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#333333">STG 環境</text>
  <rect x="770" y="250" width="160" height="56" rx="10" fill="#e9f7f2" stroke="#00a984" stroke-width="2"/>
