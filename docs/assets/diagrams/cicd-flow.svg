  <rect x="350" y="330" width="260" height="60" rx="10" fill="#ffffff" stroke="#cdeae0" stroke-width="1.4"/>
  <text x="480" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#333333">GitHub Secrets / Variables</text>
  <text x="480" y="373" text-anchor="middle" font-size="11" fill="#6b7280">環境別の機密・設定値</text>
